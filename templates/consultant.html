<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SolveChain Consultant</title>
  <link rel="stylesheet" href="/static/consultant.css" />
</head>
<body>
  <header class="banner">
    <a class="banner-title" href="/">SolveChain | Discovery to Action</a>
    <button
      class="menu-toggle"
      id="menu-toggle"
      aria-expanded="false"
      aria-controls="nav-menu"
      aria-label="Toggle menu"
    >
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-menu" id="nav-menu">
      <a href="/">Home</a>
      <a href="/consultant">Consultant</a>
      <button id="logout-btn" type="button">Logout</button>
    </nav>
  </header>

  <main class="page">
    <header class="hero">
      <p class="eyebrow">SolveChain Workspace</p>
      <h1>Automation Discovery Chat</h1>
      <p>Answer a few quick prompts, then click the button below to generate your app immediately.</p>
    </header>

    <section class="panel chat-panel">
      <div id="chat-thread" class="chat-thread" aria-live="polite"></div>
      <form id="chat-form" class="chat-entry">
        <textarea id="chat-input" rows="2" placeholder="Type your response..."></textarea>
        <button type="submit">Send</button>
      </form>
    </section>

    <section class="panel action-panel">
      <button id="done-btn" type="button" disabled>
        I'm done thank you.<br />
        Go solve my problems!
      </button>
      <p id="status" class="muted"></p>
      <p id="error" class="error" hidden></p>
    </section>
  </main>

  <script src="/static/consultant.js"></script>
</body>
</html>
