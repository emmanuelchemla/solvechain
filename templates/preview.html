<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SolveChain Preview v{{ version }}</title>
  <link rel="stylesheet" href="/static/preview.css" />
</head>
<body>
  <header class="banner">
    <a class="banner-title" href="/">SolveChain | Discovery to Action</a>
    <button
      class="menu-toggle"
      id="menu-toggle"
      aria-expanded="false"
      aria-controls="nav-menu"
      aria-label="Toggle menu"
    >
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-menu" id="nav-menu">
      <a href="/">Home</a>
      <a href="/consultant">Consultant</a>
      <button id="logout-btn" type="button">Logout</button>
    </nav>
  </header>

  <main class="page">
    <section class="dash-row">
      <article class="panel ideas-panel">
        <h1>Web app ideas</h1>
        <div id="ideas-generation" class="ideas-generation" aria-live="polite">
          <p id="generation-status" class="generation-status">Synthesizing and ranking ideas...</p>
          <div class="generation-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <span id="generation-fill" class="generation-fill"></span>
          </div>
        </div>
        <div id="idea-strip" class="idea-strip">
          {% for idea in ideas %}
          <button
            class="idea-card"
            type="button"
            data-index="{{ loop.index0 }}"
            data-importance="{{ idea.importance }}"
            data-title="{{ idea.title }}"
            data-function="{{ idea.function }}"
            data-rationale="{{ idea.rationale }}"
            data-team="{{ idea.team }}"
            data-timeline="{{ idea.timeline }}"
            data-impact="{{ idea.impact }}"
            data-confidence="{{ idea.confidence }}"
            data-app-url="{{ idea.app_url }}"
            data-ready="false"
          >
            <h3>{{ idea.title }}</h3>
            <p class="metric">Importance <span class="stars">{{ idea.importance_stars }}</span></p>
            <p class="metric">Feasibility <span class="stars">{{ idea.feasibility_stars }}</span></p>
            <p class="metric">Team <span>{{ idea.team }}</span></p>
            <p class="metric">Window <span>{{ idea.timeline }}</span></p>
            <p class="price">Estimated {{ idea.price }}</p>
            <div class="card-status">
              <div class="card-progress-track" aria-hidden="true">
                <span class="card-progress-fill"></span>
              </div>
              <span class="card-check" aria-hidden="true">✓</span>
            </div>
            <div class="idea-tooltip" aria-hidden="true">
              <p><strong>Function:</strong> {{ idea.function }}</p>
              <p><strong>Rationale:</strong> {{ idea.rationale }}</p>
            </div>
          </button>
          {% endfor %}
        </div>
      </article>

      <aside class="panel feedback-panel">
        <h2>Feedback</h2>
        <div id="ideas-feedback-thread" class="feedback-thread"></div>
        <form id="ideas-feedback-form" class="stack">
          <textarea id="ideas-feedback-input" rows="3" placeholder="What should change in these web app ideas?"></textarea>
          <button type="submit">Send</button>
        </form>
        <p id="ideas-error" class="error" hidden></p>
      </aside>
    </section>

    <section class="dash-row">
      <article class="panel preview-panel">
        <h1>Webapp preview</h1>
        <div id="preview-empty" class="preview-empty">Select a completed idea to open its preview.</div>
        <h3 id="selected-title" hidden></h3>
        <div id="selected-context" class="context-chips" hidden>
          <div class="context-chip"><span class="label">Function</span><span id="selected-function"></span></div>
          <div class="context-chip"><span class="label">Rationale</span><span id="selected-rationale"></span></div>
          <div class="context-chip"><span class="label">Team</span><span id="selected-team"></span></div>
          <div class="context-chip"><span class="label">Window</span><span id="selected-timeline"></span></div>
          <div class="context-chip"><span class="label">Impact</span><span id="selected-impact"></span></div>
          <div class="context-chip"><span class="label">Confidence</span><span id="selected-confidence"></span></div>
        </div>
        <iframe id="app-frame" src="about:blank" title="Generated app preview" hidden></iframe>
      </article>

      <aside class="panel feedback-panel">
        <h2>Feedback</h2>
        <div id="preview-feedback-thread" class="feedback-thread"></div>
        <form id="preview-feedback-form" class="stack">
          <textarea id="preview-feedback-input" rows="3" placeholder="What should change in this preview app?"></textarea>
          <button type="submit">Send</button>
        </form>
        <p id="preview-error" class="error" hidden></p>
      </aside>
    </section>
  </main>

  <script>
    window.SOLVECHAIN_PREVIEW = {
      sessionId: "{{ session_id }}",
      version: {{ version }}
    };
  </script>
  <script src="/static/preview.js?v=20260419a"></script>
</body>
</html>
