<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SolveChain Preview v{{ version }}</title>
  <link rel="stylesheet" href="/static/preview.css" />
</head>
<body>
  <header class="banner">
    <a class="banner-title" href="/">SolveChain | Discovery to Action</a>
    <button
      class="menu-toggle"
      id="menu-toggle"
      aria-expanded="false"
      aria-controls="nav-menu"
      aria-label="Toggle menu"
    >
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-menu" id="nav-menu">
      <a href="/">Home</a>
      <a href="/consultant">Consultant</a>
      <button id="logout-btn" type="button">Logout</button>
    </nav>
  </header>

  <main class="page">
    <section class="dash-row">
      <article class="panel ideas-panel">
        <h1>Web app ideas</h1>
        <div id="idea-strip" class="idea-strip">
          {% for idea in ideas %}
          <button
            class="idea-card{% if loop.first %} active{% endif %}"
            type="button"
            data-index="{{ loop.index0 }}"
            data-title="{{ idea.title }}"
            data-function="{{ idea.function }}"
            data-rationale="{{ idea.rationale }}"
            data-app-url="{{ idea.app_url }}"
          >
            <h3>{{ idea.title }}</h3>
            <p class="metric">Importance <span class="stars">{{ idea.importance_stars }}</span></p>
            <p class="metric">Feasibility <span class="stars">{{ idea.feasibility_stars }}</span></p>
            <p class="price">Estimated {{ idea.price }}</p>
            <div class="idea-tooltip" aria-hidden="true">
              <p><strong>Function:</strong> {{ idea.function }}</p>
              <p><strong>Rationale:</strong> {{ idea.rationale }}</p>
            </div>
          </button>
          {% endfor %}
        </div>
      </article>

      <aside class="panel feedback-panel">
        <h2>Feedback</h2>
        <div id="ideas-feedback-thread" class="feedback-thread"></div>
        <form id="ideas-feedback-form" class="stack">
          <textarea id="ideas-feedback-input" rows="3" placeholder="What should change in these web app ideas?"></textarea>
          <button type="submit">Send</button>
        </form>
        <p id="ideas-error" class="error" hidden></p>
      </aside>
    </section>

    <section class="dash-row">
      <article class="panel preview-panel">
        <h1>Webapp preview</h1>
        <h3 id="selected-title">{{ ideas[0].title if ideas else 'Generated App' }}</h3>
        <p id="selected-function" class="context-line"><strong>Function:</strong> {{ ideas[0].function if ideas else '' }}</p>
        <p id="selected-rationale" class="context-line"><strong>Rationale:</strong> {{ ideas[0].rationale if ideas else '' }}</p>
        <iframe id="app-frame" src="{{ app_url }}" title="Generated app preview"></iframe>
      </article>

      <aside class="panel feedback-panel">
        <h2>Feedback</h2>
        <div id="preview-feedback-thread" class="feedback-thread"></div>
        <form id="preview-feedback-form" class="stack">
          <textarea id="preview-feedback-input" rows="3" placeholder="What should change in this preview app?"></textarea>
          <button type="submit">Send</button>
        </form>
        <p id="preview-error" class="error" hidden></p>
      </aside>
    </section>
  </main>

  <script>
    window.SOLVECHAIN_PREVIEW = {
      sessionId: "{{ session_id }}",
      version: {{ version }}
    };
  </script>
  <script src="/static/preview.js"></script>
</body>
</html>
